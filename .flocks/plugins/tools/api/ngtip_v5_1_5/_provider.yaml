name: ngtip
service_id: ngtip_api
version: "5.1.5"
description: >
  NGTIP (Next Generation Threat Intelligence Platform) API service.
  Covers two endpoint categories: intelligence query (port 8090) and
  platform functions (management / write). Configure APIKEY and both
  Base URLs in the credentials form.
description_cn: >
  NGTIP 威胁情报平台 API 服务，覆盖情报查询（端口 8090）和平台功能（管理写入）两类接口。
  需分别配置 APIKEY、平台功能 Base URL 和情报查询 Base URL。
auth:
  type: custom
  secret: ngtip_apikey
credential_fields:
  - key: apikey
    label: APIKEY
    storage: secret
    config_key: apiKey
    secret_id: ngtip_apikey
    input_type: password
    required: true
  - key: base_url
    label: 平台功能 Base URL
    storage: config
    config_key: base_url
    input_type: url
    default: "http://YOUR_NGTIP_IP"
  - key: query_base_url
    label: 情报查询 Base URL
    storage: config
    config_key: query_base_url
    input_type: url
    default: "http://YOUR_NGTIP_IP:8090"
defaults:
  base_url: "http://YOUR_NGTIP_IP"
  query_base_url: "http://YOUR_NGTIP_IP:8090"
  timeout: 60
  category: custom
  product_version: "5.1.5"
notes: |
  NGTIP API 分为两类，Base URL 不同，务必在配置中均填写：
    - 平台功能接口：base_url（如 http://192.168.1.100）
    - 情报查询接口：query_base_url（如 http://192.168.1.100:8090）
  认证：所有接口携带 apikey 参数。情报查询接口推荐 GET 传参，平台功能接口使用 POST JSON。
