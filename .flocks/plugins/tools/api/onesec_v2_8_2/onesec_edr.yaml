name: onesec_edr
description: >
  OneSEC EDR grouped tool. Use the `action` parameter to access endpoint
  detection, response, IOC, and action-status APIs. Configure the OneSEC
  service with separate API Key and Secret credentials.
description_cn: >
  OneSEC EDR 分组工具。通过 `action` 参数调用终端检测与响应、IOC 和动作状态相关接口。
  【选用原则】通用事件/告警查询优先使用分页接口，并显式传 `time_from`、`time_to`；
  若不传时间，返回范围由服务端默认窗口决定，仅作兜底，不建议依赖。
  `edr_get_recent_*` 系列接口仅适用于最近 24 小时内的增量查询。
  请在 OneSEC 服务配置中分别填写 API Key、Secret，Base URL 可按需覆盖。
category: custom
enabled: true
requires_confirmation: true
provider: onesec_api
inputSchema:
  type: object
  properties:
    action:
      type: string
      description: |
        EDR 分组动作名，可选值：
        - edr_get_threat_files
          用途: 分页查询恶意文件（通用查询首选，适合历史回溯）
          必填: 无
          常用: `time_from`、`time_to`、`group_list`、`umid_list`、`cur_page`、`page_size`
          风险提示: 更适合全量回溯；如需排序扩展需结合后端实现
          是否任务型: 否
        - edr_get_recent_threat_files
          用途: 查询近期恶意文件（仅适用于增量同步，有严格时间限制）
          必填: 无
          常用: `time_from`、`time_to`、`group_list`、`threat_severity`
          ⚠️ 限制: 仅支持最近 24 小时的数据；超出范围将被服务器拒绝
          ⚠️ 推荐: 通用查询请优先使用 `edr_get_threat_files`
          是否任务型: 否
        - edr_get_threat_activities
          用途: 分页查询威胁行为（通用查询首选，适合历史回溯）
          必填: 无
          常用: `time_from`、`time_to`、`group_list`、`threat_phase_list`、`cur_page`、`page_size`
          风险提示: 行为筛选条件较多，优先显式传时间范围
          是否任务型: 否
        - edr_get_recent_threat_activities
          用途: 查询近期威胁行为（仅适用于增量同步，有严格时间限制）
          必填: 无
          常用: `time_from`、`time_to`、`group_list`、`threat_phase_list`
          ⚠️ 限制: 仅支持最近 24 小时的数据；超出范围将被服务器拒绝
          ⚠️ 推荐: 通用查询请优先使用 `edr_get_threat_activities`
          是否任务型: 否
        - edr_get_incidents
          用途: 分页查询威胁事件（通用查询首选，适合历史回溯）
          必填: 无
          常用: `time_from`、`time_to`、`params`、`cur_page`、`page_size`
          风险提示: 返回事件对象较复杂，后续常用于提取 `incident_id`
          是否任务型: 否
        - edr_get_recent_incidents
          用途: 查询近期威胁事件（仅适用于增量同步，有严格时间限制）
          必填: 无
          常用: `time_from`、`time_to`、`params`
          ⚠️ 限制: 仅支持最近 24 小时的数据；超出范围将被服务器拒绝
          ⚠️ 推荐: 仅最近 24 小时增量才使用；若用户请求本周、最近 7 天或更长时间窗，应改用 `edr_get_incidents`
          是否任务型: 否
        - edr_get_endpoint_alerts
          用途: 分页查询终端告警日志（通用查询首选，适合历史回溯）
          必填: 无
          常用: `time_from`、`time_to`、`sql`、`search_fields`、`cur_page`、`page_size`
          风险提示: 若返回字段过多可能导致接口耗时增加
          是否任务型: 否
        - edr_get_recent_endpoint_alerts
          用途: 查询近期终端告警日志（仅适用于增量同步，有严格时间限制）
          必填: 无
          常用: `time_from`、`time_to`、`sql`、`search_fields`
          ⚠️ 限制: 仅支持最近 24 小时的数据；time_from 距当前时间超过 24 小时将被服务器拒绝
          ⚠️ 推荐: 通用查询请优先使用 `edr_get_endpoint_alerts`，并显式传 `time_from`、`time_to`
          是否任务型: 否
        - edr_get_threat_disposals
          用途: 分页查询威胁处置清单
          必填: `incident_id`、`umid`
          常用: `cur_page`、`page_size`、`sort_by`、`sort_order`
          风险提示: 实网通常要求 `incident_id` 与 `umid` 一起传
          是否任务型: 否
        - edr_get_recent_threat_disposals
          用途: 查询近期威胁处置清单
          必填: `incident_id`、`umid`
          常用: `sort_by`、`sort_order`
          风险提示: 实网通常要求 `incident_id` 与 `umid` 一起传
          是否任务型: 否
        - edr_get_threat_timeline
          用途: 分页查询指定威胁事件的时间线
          必填: `incident_id`
          常用: `incident_id`、`time_from`、`time_to`、`cur_page`、`page_size`
          风险提示: 需要先拿到 `incident_id`；若只知道事件列表，应先调用 `edr_get_incidents`
          是否任务型: 否
        - edr_get_recent_threat_timeline
          用途: 查询指定威胁事件的近期时间线（仅适用于增量同步，有严格时间限制）
          必填: `incident_id`
          常用: `incident_id`、`time_from`、`time_to`
          ⚠️ 限制: 仅支持最近 24 小时的数据；超出范围将被服务器拒绝
          ⚠️ 推荐: 需要先拿到 `incident_id`；若时间窗超过 24 小时或需要历史回溯，请改用 `edr_get_threat_timeline`
          是否任务型: 否
        - edr_get_ioc_list
          用途: 分页查询 IOC 名单
          必填: 无
          常用: `fuzzy`、`ioc_severity_list`、`cur_page`、`page_size`、`sort_by`、`sort_order`
          风险提示: 分页字段使用 `page_size`，不是旧版 `pagesize`
          是否任务型: 否
        - edr_isolate_endpoints
          用途: 下发终端隔离任务
          必填: `agent_list`
          常用: `agent_list`
          风险提示: 高风险写操作；会影响终端网络可达性
          是否任务型: 是
        - edr_unisolate_endpoints
          用途: 下发取消终端隔离任务
          必填: `agent_list`
          常用: `agent_list`
          风险提示: 写操作；用于恢复隔离终端
          是否任务型: 是
        - edr_quarantine_files
          用途: 下发文件隔离任务
          必填: `agent_list`、`file_path`
          常用: `file_sha256`、`file_md5`
          风险提示: 高风险写操作；会直接处置终端文件
          是否任务型: 是
        - edr_quarantine_proc_files
          用途: 下发进程文件隔离任务
          必填: `agent_list`、`file_path`
          常用: `file_sha256`、`file_md5`、`pid`
          风险提示: 高风险写操作；可能影响运行中进程
          是否任务型: 是
        - edr_restore_quarantined_files
          用途: 下发恢复隔离文件任务
          必填: `agent_list`、`file_path`
          常用: `file_sha256`、`file_md5`
          风险提示: 写操作；会恢复已隔离文件
          是否任务型: 是
        - edr_block_network_connections
          用途: 下发网络阻断任务
          必填: `agent_list`，以及 `ip_port` 或 `domain_name` 其一
          常用: `ip_port`、`domain_name`
          风险提示: 高风险写操作；会阻断终端访问指定网络目标
          是否任务型: 是
        - edr_unblock_network_connections
          用途: 下发取消网络阻断任务
          必填: `agent_list`，以及 `ip_port` 或 `domain_name` 其一
          常用: `ip_port`、`domain_name`
          风险提示: 写操作；用于解除已有阻断
          是否任务型: 是
        - edr_disable_service
          用途: 下发禁用服务任务
          必填: `agent_list`、`service_name`
          常用: `is_quarant_file`
          风险提示: 高风险写操作；可能影响系统或业务服务
          是否任务型: 是
        - edr_restore_disabled_service
          用途: 下发恢复服务任务
          必填: `agent_list`、`service_name`
          常用: `service_name`
          风险提示: 写操作；用于恢复被禁用服务
          是否任务型: 是
        - edr_get_action_status
          用途: 获取动作任务执行状态
          必填: `task_id`
          常用: `time_sort`、`cur_page`、`page_size`
          风险提示: 常用于轮询任务执行结果
          是否任务型: 否
        - edr_delete_registry_startup
          用途: 下发删除注册表启动项任务
          必填: `agent_list`、`registry_path`、`registry_type`
          常用: `registry_path`、`registry_type`
          风险提示: 高风险写操作；会修改终端启动项
          是否任务型: 是
        - edr_delete_ioc
          用途: 从 IOC 名单中批量删除
          必填: `iocs`
          常用: `iocs`
          风险提示: 写操作；会直接变更 IOC 策略
          是否任务型: 否
        - edr_add_ioc
          用途: 向 IOC 名单中批量添加
          必填: `iocs`、`severity`、`threatName`
          常用: `remark`
          风险提示: 写操作；会直接变更 IOC 策略
          是否任务型: 否
      enum:
        - edr_get_threat_files
        - edr_get_recent_threat_files
        - edr_get_threat_activities
        - edr_get_recent_threat_activities
        - edr_get_incidents
        - edr_get_recent_incidents
        - edr_get_endpoint_alerts
        - edr_get_recent_endpoint_alerts
        - edr_get_threat_disposals
        - edr_get_recent_threat_disposals
        - edr_get_threat_timeline
        - edr_get_recent_threat_timeline
        - edr_get_ioc_list
        - edr_isolate_endpoints
        - edr_unisolate_endpoints
        - edr_quarantine_files
        - edr_quarantine_proc_files
        - edr_restore_quarantined_files
        - edr_block_network_connections
        - edr_unblock_network_connections
        - edr_disable_service
        - edr_restore_disabled_service
        - edr_get_action_status
        - edr_delete_registry_startup
        - edr_delete_ioc
        - edr_add_ioc
    time_from:
      type: integer
      description: >
        开始时间戳，Unix 秒级时间戳。
        注意：传入前请确认 time_from < time_to；对于 recent 系列接口，
        time_from 距当前时间不能超过 24 小时，否则服务器会拒绝请求。可以使用python datetime动态计算。
        分页接口可不传，但此时返回范围由服务端默认窗口决定，仅作兜底，不建议依赖。
    time_to:
      type: integer
      description: >
        结束时间戳，Unix 秒级时间戳。必须大于 time_from。可以使用python datetime动态计算。
        分页接口可不传，但此时返回范围由服务端默认窗口决定，仅作兜底，不建议依赖。
    group_list:
      type: array
      items:
        type: integer
      description: 分组 ID 列表
    umid_list:
      type: array
      items:
        type: string
      description: 终端 UMID 列表
    threat_severity:
      type: array
      items:
        type: integer
      description: 威胁严重等级列表
    process_result:
      type: array
      items:
        type: integer
      description: 处置状态列表
    threat_file_type:
      type: array
      items:
        type: string
      description: 威胁文件类型列表
    search_field:
      type: object
      description: 结构化查询字段
    fuzzy:
      type: string
      description: 模糊查询关键词
    cur_page:
      type: integer
      default: 1
      description: 页码
    page_size:
      type: integer
      default: 20
      description: 每页数量
    sort_by:
      type: string
      description: 排序字段
    sort_order:
      type: string
      description: 排序方向
    threat_phase_list:
      type: array
      items:
        type: object
      description: 威胁阶段列表
    os_list:
      type: array
      items:
        type: string
      description: 操作系统列表
    umid:
      type: string
      description: 单个终端 UMID
    incident_id:
      type: string
      description: 威胁事件 ID
    params:
      type: array
      items:
        type: object
      description: 复杂筛选条件
    sql:
      type: string
      description: SQL 查询条件
    search_fields:
      type: array
      items:
        type: string
      description: 搜索字段列表
    agent_list:
      type: array
      items:
        type: string
      description: 终端 UMID 列表
    file_path:
      type: string
      description: 文件路径
    file_sha256:
      type: string
      description: 文件 SHA256
    file_md5:
      type: string
      description: 文件 MD5
    pid:
      type: string
      description: 进程 ID
    ip_port:
      type: string
      description: IP:端口
    domain_name:
      type: string
      description: 域名
    service_name:
      type: string
      description: 服务名称
    is_quarant_file:
      type: boolean
      description: 是否同时隔离文件
    task_id:
      type: integer
      description: 任务 ID
    time_sort:
      type: integer
      description: 任务状态排序
    registry_path:
      type: integer
      description: 注册表类型，`1` 表示注册表项，`2` 表示注册表值
    registry_type:
      type: string
      description: 注册表项或注册表值的完整路径
    iocs:
      type: array
      items:
        type: string
      description: IOC 列表
    severity:
      type: integer
      description: IOC 严重等级
    ioc_severity_list:
      type: array
      items:
        type: integer
      description: IOC 列表查询的严重等级筛选
    threatName:
      type: string
      description: 威胁名称
    remark:
      type: string
      description: 备注
  required:
    - action
handler:
  type: script
  script_file: onesec.handler.py
  function: edr
