name: onesec
service_id: onesec_api
version: "2.8.2"
description: >
  OneSEC endpoint security platform API service. Configure API Key, Secret,
  and optional Base URL separately in the credentials form. Base URL defaults
  to `https://console.onesec.net`.
description_cn: >
  OneSEC 终端安全平台 API 服务。当前配置页需要分别填写 API Key、Secret 和
  Base URL；其中 Base URL 可留空，默认使用 `https://console.onesec.net`。
auth:
  type: custom
  secret: onesec_api_key
  secret_secret: onesec_secret
credential_fields:
  - key: api_key
    label: API Key
    storage: secret
    config_key: apiKey
    secret_id: onesec_api_key
    input_type: password
    required: true
  - key: secret
    label: Secret
    storage: secret
    config_key: secret
    secret_id: onesec_secret
    input_type: password
    required: true
  - key: base_url
    label: Base URL
    storage: config
    config_key: base_url
    input_type: url
    default: "https://console.onesec.net"
defaults:
  base_url: "https://console.onesec.net"
  timeout: 60
  category: custom
  product_version: "2.8.2"
notes: |
  OneSEC API 使用 HMAC-SHA1 查询参数签名认证。
  当前配置页推荐分别配置：
    - API Key
    - Secret
    - Base URL（可选）
  也兼容历史的单值 secret 格式：
    - onesec_credentials = "your_api_key|your_secret"
  配置文件方式可分别写入：
    - api_services.onesec_api.apiKey = "{secret:onesec_api_key}"
    - api_services.onesec_api.secret = "{secret:onesec_secret}"
