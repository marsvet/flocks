name: onesec_threat
description: >
  OneSEC threat protection grouped tool. Use the `action` parameter to access
  antivirus version and scan task APIs. Configure the OneSEC service with
  separate API Key and Secret credentials.
description_cn: >
  OneSEC 威胁防护分组工具。通过 `action` 参数调用病毒库版本和扫描任务相关接口。
  请在 OneSEC 服务配置中分别填写 API Key、Secret，Base URL 可按需覆盖。
category: custom
enabled: true
requires_confirmation: true
provider: onesec_api
inputSchema:
  type: object
  properties:
    action:
      type: string
      description: |
        Threat 分组动作名，可选值：
        - threat_query_bd_version
          用途: 查询病毒库版本信息
          必填: 无
          常用: 无
          风险提示: 只读查询接口
          是否任务型: 否
        - threat_virus_scan
          用途: 下发病毒扫描任务
          必填: `agent_list`、`task_type`/`scan_type`、`scanmode`；当 `task_type=10130` 时还需 `scan_paths`
          常用: `scan_paths`、`scanmode`、`task_type`
          风险提示: 高风险任务；扫描范围较大时可能影响终端性能
          是否任务型: 是
        - threat_stop_virus_scan
          用途: 下发终止病毒扫描任务
          必填: `agent_list`
          常用: `agent_list`
          风险提示: 写操作；用于终止正在执行的扫描任务
          是否任务型: 是
        - threat_upgrade_bd_version_task
          用途: 下发病毒库升级任务
          必填: `agent_list`、`bd_upgrade_type`
          常用: `bd_upgrade_type`
          风险提示: 写操作；会触发终端更新病毒库
          是否任务型: 是
        - threat_update_bd_version
          用途: 修改病毒库应用版本
          必填: `os_platform`；当 `os_platform=macos` 时还需 `os_arch`
          常用: `os_arch`
          风险提示: 写操作；平台参数不匹配会被工具层拦截
          是否任务型: 否
      enum:
        - threat_query_bd_version
        - threat_virus_scan
        - threat_stop_virus_scan
        - threat_upgrade_bd_version_task
        - threat_update_bd_version
    agent_list:
      type: array
      items:
        type: string
      description: 终端 UMID 列表
    task_type:
      type: integer
      description: 病毒扫描任务类型
    scan_paths:
      type: array
      items:
        type: object
      description: 自定义扫描路径
    scanmode:
      type: integer
      description: 扫描模式
    scan_type:
      type: integer
      description: 兼容旧调用的病毒扫描任务类型别名
    bd_upgrade_type:
      type: integer
      description: 病毒库升级类型
    issue_time:
      type: integer
      description: 下发时间
    os_platform:
      type: string
      description: 操作系统平台
    os_arch:
      type: string
      description: 系统架构
  required:
    - action
handler:
  type: script
  script_file: onesec.handler.py
  function: threat
