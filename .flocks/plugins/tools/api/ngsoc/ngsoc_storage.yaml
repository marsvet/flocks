name: ngsoc_storage
description: >
  NGSOC storage management grouped tool. Use the `action` parameter to
  download files (PCAP, evidence packs, exported reports) generated by
  other modules. Binary payloads are persisted under
  `~/.flocks/workspace/outputs/<today>/ngsoc_*` with the saved path
  returned in the result metadata (manual §5.8).
description_cn: >
  NGSOC 存储管理分组工具，对应手册「5.8 存储管理」1 个接口。
  通过 `action=storage_download` 下载其他模块产出的 PCAP / 取证 /
  报表二进制文件，文件落盘到
  `~/.flocks/workspace/outputs/<today>/ngsoc_*` 并在 metadata 中
  返回 `saved_path`。
category: custom
enabled: true
requires_confirmation: false
provider: ngsoc_api
version: "4.15.1"
inputSchema:
  type: object
  properties:
    action:
      type: string
      description: |
        Storage 分组动作名（手册 §5.8）：
        - storage_download   GET /storage/download    下载文件（二进制）
      enum:
        - storage_download
    serviceName:
      type: string
      description: 服务名，可选（默认值见手册示例）。
    fileName:
      type: string
      description: 文件名，可选（不传则采用接口默认命名）。
    uuidName:
      type: string
      description: 文件唯一 uuid（storage_download 必填，手册 §5.8.1 query 表）。
    mode:
      type: string
      description: |
        下载模式（storage_download 可选，手册 §5.8.1）：
        - `inline`     在浏览器内联展示（默认）
        - `attachment` 强制按附件下载
      enum:
        - inline
        - attachment
    clusterId:
      type: integer
      description: 集群 id，可选（多集群部署使用，默认本级；手册 §5.8.1）。
  required:
    - action
handler:
  type: script
  script_file: ngsoc.handler.py
  function: storage
