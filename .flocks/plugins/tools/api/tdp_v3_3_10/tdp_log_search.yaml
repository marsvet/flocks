name: tdp_log_search
description: >
  查询 TDP 日志调查/告警相关接口。默认执行日志搜索，也可通过 action 切换到字段聚合统计。
category: custom
enabled: true
requires_confirmation: false
provider: tdp_api

inputSchema:
  type: object
  properties:
    action:
      type: string
      description: >
        日志调查子接口动作。`search` 会自动补齐根级 `time_from`、
        `time_to` 和 `net_data_type`；`terms` 还会默认补
        `term=threat.name` 与 `size=10`，适合做字段聚合统计。
      enum: [search, terms]
      default: search
    time_from:
      type: integer
      description: 开始时间戳，Unix 秒级时间戳。必须使用python datetime动态计算，防止出错。
    time_to:
      type: integer
      description: 结束时间戳，Unix 秒级时间戳。必须使用python datetime动态计算，防止出错。
    net_data_type:
      type: array
      items:
        type: string
      description: 日志类型列表，常见值为 `attack`、`risk`、`action`；查询原始告警时通常传这三类中的一个或多个。
    sql:
      type: string
      default: "threat.level = 'attack'"
      description: >
        TDP 的高级查询过滤表达式，不是完整 SQL 语句；禁止使用 `SELECT * FROM ...`。
        `search` 未传时默认使用 `threat.level = 'attack'`，`terms` 可不传。
        正确示例：`threat.level = 'attack' AND threat.result = 'success'`。
    columns:
      type: array
      items:
        type: object
      description: 搜索返回字段对象列表，元素通常包含 `label` 与 `value`。适合在 `search` 动作中定制返回列，例如时间、威胁名称、源 IP、目的 IP 等。
    assets_group:
      type: array
      items:
        type: integer
      description: 业务组 ID 列表，用于限制查询范围到指定业务组。
    cascade_asset_group:
      type: object
      description: >
        级联资产组筛选，适用于 `terms`；通常是
        `{资产组ID: [-1]}` 这类对象结构，用于包含子组。
    term:
      type: string
      description: 聚合字段，适用于 `terms`，例如 `threat.name`、`net.src_ip`、`net.dest_ip`、`net.http.url`。
    size:
      type: integer
      description: 返回数量控制参数；`search` 用于限制返回日志条数，`terms` 用于限制聚合桶数量，默认值为 `10`。注意本工具不支持 `page_size`。
    log_ip:
      type: string
      description: 日志节点 IP，适用于 `terms`，用于指定某个日志节点做聚合统计。
  required: []
handler:
  type: script
  script_file: tdp.handler.py
  function: log_search
