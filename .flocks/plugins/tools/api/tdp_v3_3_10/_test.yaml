schema_version: 1
provider: tdp_api

# Service-level connectivity probe.
# `system_status` with `action: all` is a lightweight multi-endpoint health
# check; it verifies HMAC-SHA256 signing and basic platform reachability.
connectivity:
  tool: tdp_system_status
  params:
    action: all

# Tool-level test samples shown in the WebUI ToolDetailDrawer drop-down.
# `label` is the default (English) display string; `label_cn` is the
# optional Chinese override picked when the WebUI runs in zh-CN.
fixtures:
  tdp_system_status:
    - label: "Get all system status"
      label_cn: "查询所有系统状态"
      tags: [smoke]
      params:
        action: all
      assert:
        success: true

  tdp_dashboard_status:
    - label: "Get dashboard status overview"
      label_cn: "获取监控大屏状态概览"
      tags: [smoke, dashboard]
      params:
        action: status
      assert:
        success: true

  tdp_platform_config:
    - label: "Get platform configuration"
      label_cn: "查询平台配置"
      tags: [smoke]
      params: {}
      assert:
        success: true

  tdp_incident_list:
    - label: "Search incidents (page 1)"
      label_cn: "查询威胁事件列表（第 1 页）"
      tags: [smoke, incidents]
      params:
        action: search
        cur_page: 1
        page_size: 20
      assert:
        success: true

    - label: "Top attacked entities (last 24 hours)"
      label_cn: "Top 受攻击实体（最近 24 小时）"
      tags: [incidents]
      params:
        action: top_attacked_entity

  tdp_host_threat_list:
