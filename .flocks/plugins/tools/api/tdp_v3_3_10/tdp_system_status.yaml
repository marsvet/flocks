name: tdp_system_status
description: >
  查询 TDP 系统运行状态。默认返回全部状态汇总，也可通过 action 切换到单个子状态接口。
category: custom
enabled: true
requires_confirmation: false
provider: tdp_api

inputSchema:
  type: object
  properties:
    action:
      type: string
      description: >
        系统状态子接口动作。`all` 会依次请求全部状态接口并汇总结果；
        其他动作分别对应单个状态检查，均不需要请求体。
      enum: [all, core, ioc_update, hardware, input, database, timezone, service, cloud_connectivity]
      default: all
  required: []
handler:
  type: script
  script_file: tdp.handler.py
  function: system_status
