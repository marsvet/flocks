name: TDP
service_id: tdp_api
version: "3.3.10"
description: >
  TDP monitoring platform API for dashboard, threat investigation, asset risk,
  log search, MDR analysis, and system status queries.
description_cn: >
  TDP 监测平台接口，提供监控看板、威胁调查、资产风险、日志检索、MDR、告警调查
  研判和系统运行状态查询能力。
auth:
  type: custom
  secret: tdp_api_key
  secret_secret: tdp_secret
credential_fields:
  - key: api_key
    label: API Key
    storage: secret
    config_key: apiKey
    secret_id: tdp_api_key
    input_type: password
    required: true
  - key: secret
    label: Secret
    storage: secret
    config_key: secret
    secret_id: tdp_secret
    input_type: password
    required: true
  - key: base_url
    label: Base URL
    storage: config
    config_key: base_url
    input_type: url
    default: "https://{secret:tdp_host}"
defaults:
  base_url: "https://{secret:tdp_host}"
  timeout: 30
  category: custom
  product_version: "3.3.10"
notes: |
  TDP API 使用 HMAC-SHA256 + Base64 URL Safe 签名。
  当前配置页需要分别配置：
    - API Key
    - Secret
    - Base URL
  也支持以配置文件方式分别写入：
    - tdp_api_key = "your_api_key"
    - tdp_secret = "your_secret"
    - tdp_host = "tdp.example.com"
    - api_services.tdp_api.base_url = "https://tdp.example.com"
