name: sangfor_sip_risk
description: >
  Query Sangfor SIP risk business/terminal data.
  Pulls risk business and terminal information from
  GET /sangforinter/v1/data/riskBusiness.
description_cn: >
  查询深信服 SIP 风险业务/终端数据。
  从 SIP 拉取风险业务与风险终端信息，包含风险评分、威胁类型、关联资产等字段。
category: custom
enabled: true
requires_confirmation: false
provider: sangfor_sip

inputSchema:
  type: object
  properties:
    from_time:
      type: integer
      description: >
        起始时间戳（Unix 秒级），默认为 24 小时前。
        支持 ISO8601 字符串，如 "2024-06-01 00:00:00"。
    to_time:
      type: integer
      description: 截止时间戳（Unix 秒级），默认为当前时间。
    max_count:
      type: integer
      description: >
        单次最大拉取条数（默认 2000，最大 10000）。
      default: 2000
  required: []

handler:
  type: script
  script_file: sangfor_sip.handler.py
  function: run_risk
