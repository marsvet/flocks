name: sangfor_sip
service_id: sangfor_sip
version: "9.2"
description: >
  Sangfor SIP (Security Intelligence Platform) third-party data pull API
  (v9.2 / "92 version" spec). Supports pulling asset, security event, risk,
  and vulnerability data via token-based authentication with auth3 SHA1
  signing.
description_cn: >
  深信服 SIP（安全智能平台）第三方数据拉取 API（v9.2，对应「92 版」接口规范）。
  支持拉取受监控IP、服务器资产、终端资产、安全事件、风险业务/终端
  及脆弱性（弱密码、漏洞、明文传输）等数据。
  使用 auth3（SHA1）签名认证，Token 有有效期，过期后自动重新认证。
auth:
  type: custom
  secret: sangfor_sip_password
credential_fields:
  - key: host
    label: SIP Host / IP
    storage: config
    config_key: host
    input_type: text
    required: true
    placeholder: "192.168.1.100"
  - key: platform_name
    label: Platform Name
    storage: config
    config_key: platform_name
    input_type: text
    required: true
  - key: username
    label: Username
    storage: config
    config_key: username
    input_type: text
    required: true
  - key: password
    label: Password
    storage: secret
    config_key: password
    secret_id: sangfor_sip_password
    input_type: password
    required: true
  - key: port
    label: Port
    storage: config
    config_key: port
    input_type: text
    required: false
    default: "7443"
defaults:
  timeout: 60
  category: custom
  product_version: "9.2"
notes: |
  深信服 SIP 配置说明：
  1. 在 SIP 端"更多 → 开发共享"页面新增第三方平台配置：
     - 平台名称（platformName）：唯一标识，与此处填写保持一致
     - 认证账号（userName）：与此处填写保持一致
     - 认证密码（password）：与此处填写保持一致
     - IP 地址：来拉取数据的设备 IP（填写即可，无严格校验）
     - 数据类型：需勾选想要拉取的数据类型，否则对应接口返回空数据
  2. 服务端口为 7443，非 HTTPS 标准 443 端口。
  3. 若证书过期或自签证书，请关闭表单底部的「SSL 验证」开关
     （默认即关闭；与 onesec / onesig / qingteng 行为一致）。
  4. Token 有有效期，过期后 Handler 会自动重新认证。
  5. 配置文件方式也可写入：
     - api_services.sangfor_sip.host = "192.168.1.100"
     - api_services.sangfor_sip.platform_name = "your_platform_name"
     - api_services.sangfor_sip.username = "your_username"
     - sangfor_sip_password = "your_password"（secret）

  `verify_ssl` 由表单底部「SSL 验证」开关控制，下列字段都会被
  识别为 SSL 验证开关，按以下优先级取值：
    1. `verify_ssl`                  （主键）
    2. `ssl_verify`                  （兼容别名）
    3. `custom_settings.verify_ssl`  （WebUI 表单写入位置）
    4. 兜底默认值 `False`（**默认关闭证书验证**，与 onesec / onesig 一致）
