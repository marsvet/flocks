name: sangfor_sip_risk
description: >
  Query Sangfor SIP risk data. Use the `action` parameter to select:
  - `risk_business` – 风险业务（GET /sangforinter/v1/data/riskbusiness）
  - `risk_terminal` – 风险终端（GET /sangforinter/v1/data/riskterminal）
description_cn: >
  查询深信服 SIP 风险数据。通过 `action` 参数选择子接口：
  - `risk_business`：风险业务，包含风险评分、威胁类型、关联业务/服务器等字段
  - `risk_terminal`：风险终端，包含风险评分、威胁类型、关联终端资产等字段
category: custom
enabled: true
requires_confirmation: false
provider: sangfor_sip

inputSchema:
  type: object
  properties:
    action:
      type: string
      description: >
        风险子接口类型：
        - `risk_business`：风险业务（默认）
        - `risk_terminal`：风险终端
      enum: [risk_business, risk_terminal]
      default: risk_business
    from_time:
      type: integer
      description: >
        起始时间戳（Unix 秒级），默认为 24 小时前。
        支持 ISO8601 字符串，如 "2024-06-01 00:00:00"。
    to_time:
      type: integer
      description: 截止时间戳（Unix 秒级），默认为当前时间。
    max_count:
      type: integer
      description: >
        单次最大拉取条数（默认 2000，最大 10000）。
      default: 2000
  required: [action]

handler:
  type: script
  script_file: sangfor_sip.handler.py
  function: run_risk
