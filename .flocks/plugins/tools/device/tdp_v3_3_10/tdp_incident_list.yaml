name: tdp_incident_list
description: >
  查询 TDP 智能聚合相关接口。默认返回事件列表（注意不是告警），也可通过 action 切换到时间线、
  结果分布、攻击实体、攻击者 IP 明细等子接口。优先使用顶层语义化参数，不要手写
  `condition.id`、`condition.duration`、`condition.fuzzy` 这类嵌套字段；只有在显式参数未覆盖时才使用 `condition` / `page`。
category: custom
enabled: true
requires_confirmation: false
provider: tdp_api

inputSchema:
  type: object
  properties:
    action:
      type: string
      description: >
        智能聚合子接口动作。`search` 会自动补齐 condition.time_from、
        condition.time_to、duration 和分页默认值；`top_attacked_entity`、
        `result`、`timeline`、`result_distribution` 需要传
        `incident_id`；`alert_search` 需要传 `alert_ids` 或 `condition.id`，
        且应同时提供 `page`；`attacker_ip_list` 需要传 `condition.incident_id`；
        `attacker_ip_detail` 需要传 `incident_id` 和 `attacker`。
      enum: [search, top_attacked_entity, result, timeline, alert_search, result_distribution, attacker_ip_list, attacker_ip_detail]
      default: search
    incident_id:
      type: string
      description: 事件 ID，适用于 `top_attacked_entity`、`result`、`timeline`、`result_distribution`、`attacker_ip_detail`；应先从 `search` 返回结果中获取。
    time_from:
      type: integer
      description: 开始时间戳，Unix 秒级时间戳，按动作写入根级或 `condition.time_from`。可以使用python datetime动态计算。
    time_to:
      type: integer
      description: 结束时间戳，Unix 秒级时间戳，按动作写入根级或 `condition.time_to`。可以使用python datetime动态计算。
    include_risk:
      type: boolean
      description: 是否包含风险告警；`timeline` 等动作写入根级，`alert_search` 写入 `condition.include_risk`。
    show_attack:
      type: boolean
      description: >
        是否展示攻击过程，适用于 `timeline`。handler 默认传 `true`；
        若显式传 `false`，TDP 可能返回 `show_attack is false`。
    include_action:
      type: boolean
      description: 是否包含事件告警，适用于 `alert_search`，会写入 `condition.include_action`。
    alert_ids:
      type: array
      items:
        type: string
      description: 告警 ID 列表，适用于 `alert_search`；会转换写入 `condition.id`。
    attacker:
      type: array
      items:
        type: string
      description: 攻击者 IP 列表，适用于 `attacker_ip_detail`；通常先从 `attacker_ip_list` 返回结果中获取。
    severity:
      type: array
      items:
        type: integer
        enum: [0, 1, 2, 3, 4]
      description: 严重级别列表，适用于 `search`。
    phase:
      type: array
      items:
        type: string
      description: 攻击阶段列表，适用于 `search`，例如 `recon`、`exploit`、`control`、`attack_out`、`post_exploit`。
    result:
      type: array
      items:
        type: string
        enum: [success, failed, unknown]
      description: 攻击结果列表，适用于 `search`。
    is_target_attack:
      type: boolean
      description: 是否只看针对性攻击事件，适用于 `search`。
    begin_duration:
      type: integer
      description: 持续时间起始小时数，适用于 `search`，会写入 `condition.duration.begin_duration`。
    end_duration:
      type: integer
      description: 持续时间结束小时数，适用于 `search`，会写入 `condition.duration.end_duration`。
    keyword:
      type: string
      description: >
        关键词搜索，适用于 `search`。handler 会自动组装
        `condition.fuzzy.fieldlist=["attacker_ip","host_ip","attack_name","attack_tool","incident_id"]`。
    cur_page:
      type: integer
      description: 页码，适用于 `search`、`alert_search`、`attacker_ip_list`。
    page_size:
      type: integer
      description: 每页条数，适用于 `search`、`alert_search`、`attacker_ip_list`。
    sort_by:
      type: string
      description: 排序字段，适用于列表类 action。
    sort_order:
      type: string
      enum: [asc, desc]
      description: 排序方向，适用于列表类 action。
    condition:
      type: object
      description: 高级兼容参数。仅在顶层参数未覆盖目标字段时使用。
    page:
      type: object
      description: 高级兼容分页参数。`alert_search` 如需复杂排序可直接透传。
  required: []
handler:
  type: script
  script_file: tdp.handler.py
  function: incident_list
