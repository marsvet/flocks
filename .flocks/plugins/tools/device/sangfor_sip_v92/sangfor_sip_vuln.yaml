name: sangfor_sip_vuln
description: >
  Query Sangfor SIP vulnerability data. Use the `action` parameter to select:
  - `weak_password` – 脆弱性-弱密码（弱密码账号、服务类型、端口）
  - `vuln_info`     – 脆弱性-漏洞信息（CVE、CVSS、漏洞详情、修复建议）
  - `plain_text`    – 脆弱性-明文传输信息（明文传输协议、账号泄露风险）
description_cn: >
  查询深信服 SIP 脆弱性数据。通过 `action` 参数选择子接口：
  - `weak_password`：弱密码，包含账号、服务类型、端口等
  - `vuln_info`    ：漏洞信息，包含 CVE 编号、CVSS 评分、漏洞描述、修复建议
  - `plain_text`   ：明文传输信息，包含明文传输协议及账号泄露风险
  脆弱性模块单次最大拉取限制为 5000 条（超过按 5000 处理）。
category: custom
enabled: true
requires_confirmation: false
provider: sangfor_sip

inputSchema:
  type: object
  properties:
    action:
      type: string
      description: >
        脆弱性子接口类型：
        - `weak_password`：弱密码（服务账号及弱密码详情）
        - `vuln_info`    ：漏洞信息（CVE/CVSS/修复建议）
        - `plain_text`   ：明文传输信息
      enum: [weak_password, vuln_info, plain_text]
      default: vuln_info
    from_time:
      type: integer
      description: >
        起始时间戳（Unix 秒级），默认为 24 小时前。
        支持 ISO8601 字符串。
    to_time:
      type: integer
      description: 截止时间戳（Unix 秒级），默认为当前时间。
    max_count:
      type: integer
      description: >
        单次最大拉取条数（默认 2000，脆弱性模块最大 5000，超过按 5000 处理）。
      default: 2000
  required: [action]

handler:
  type: script
  script_file: sangfor_sip.handler.py
  function: run_vuln
