name: huorong_task
description: >
  Huorong EDR task management tool. Use the `action` parameter to create
  virus scan tasks and query task results.
description_cn: >
  火绒任务管理工具。通过 `action` 参数调用查杀扫描任务创建和任务结果查询接口。
  请在火绒服务配置中分别填写 Access Key ID、Secret Key 和 Base URL。
category: custom
enabled: true
requires_confirmation: true
provider: huorong_api
inputSchema:
  type: object
  properties:
    action:
      type: string
      description: |
        任务管理动作名，可选值：
        - task_create
          用途: 创建查杀扫描任务
          必填: 无（可传 offset 控制分页）
          常用: `offset`
          风险提示: 写操作；会向指定终端下发扫描任务
          是否任务型: 是
      enum:
        - task_create
    offset:
      type: integer
      description: 分页偏移量，从 0 开始
      default: 0
  required:
    - action
handler:
  type: script
  script_file: huorong.handler.py
  function: task
