name: sangfor_af_v48_status
description: >
  Sangfor AF v8.0.48 device status tool. Query system resource usage
  (CPU, memory, disk), firmware version, network interface status,
  current time, and system uptime.
description_cn: >
  深信服 AF v8.0.48 状态中心工具。通过 `action` 参数查询系统资源（CPU/内存/磁盘）、
  固件版本、网口状态、当前时间及系统运行时长等信息。
category: custom
enabled: true
requires_confirmation: false
provider: sangfor_af
inputSchema:
  type: object
  properties:
    action:
      type: string
      description: |
        状态查询动作名，可选值：
        - get_memory_usage
          用途: 获取当前内存使用率（百分比）
          必填: 无
          风险提示: 只读查询接口
          是否任务型: 否
        - get_cpu_usage
          用途: 获取当前 CPU 使用率（百分比）
          必填: 无
          风险提示: 只读查询接口
          是否任务型: 否
        - get_disk_usage
          用途: 获取当前磁盘使用率（百分比）
          必填: 无
          风险提示: 只读查询接口
          是否任务型: 否
        - get_system_version
          用途: 获取 AF 系统固件版本信息
          必填: 无
          常用: filter（ALL/FULL/MAJOR/MINOR 等）
          风险提示: 只读查询接口
          是否任务型: 否
        - get_interface_status
          用途: 获取指定网口或全部网口的状态（流速、连接状态）
          必填: 无
          常用: interfaceNames（如 eth0，不传则获取全部）
          风险提示: 只读查询接口
          是否任务型: 否
        - get_runtime_status
          用途: 获取系统运行时长（uptime）
          必填: 无
          风险提示: 只读查询接口
          是否任务型: 否
        - get_current_time
          用途: 获取设备当前时间
          必填: 无
          风险提示: 只读查询接口
          是否任务型: 否
      enum:
        - get_memory_usage
        - get_cpu_usage
        - get_disk_usage
        - get_system_version
        - get_interface_status
        - get_runtime_status
        - get_current_time
    filter:
      type: string
      description: >
        版本信息过滤（仅用于 get_system_version）：
        ALL=显示所有，FULL=完整版本号，MAJOR=主版本号，MINOR=次版本号，
        INCREASE=增版本号，BUILD=创建日期，EN=是否英文版，HF=是否HF版，B=是否Beta版
      enum:
        - ALL
        - FULL
        - MAJOR
        - MINOR
        - INCREASE
        - BUILD
        - EN
        - HF
        - B
        - R
        - ADD
    interfaceNames:
      type: string
      description: 网口名称（如 eth0），用于 get_interface_status；不填则获取全部接口
  required:
    - action
handler:
  type: script
  script_file: sangfor_af.handler.py
  function: status
