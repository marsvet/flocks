name: metis
description: >-
  Pre-planning consultant that analyzes requests to identify hidden
  intentions, ambiguities, and AI failure points.
mode: subagent
hidden: false
tags: [system]
delegatable: true
tools:
  - read
  - bash
  - grep
  - glob
  - webfetch
  - websearch
  - lsp
  - question
  - memory_search
prompt_metadata:
  category: advisor
  cost: EXPENSIVE
  prompt_alias: Metis
  triggers:
    - domain: Pre-planning analysis
      trigger: Complex task requiring scope clarification, ambiguous requirements
  use_when:
    - Before planning non-trivial tasks
    - When user request is ambiguous or open-ended
    - To prevent AI over-engineering patterns
  avoid_when:
    - Simple, well-defined tasks
    - User has already provided detailed requirements
  key_trigger: "Ambiguous or complex request -> consult Metis before Prometheus"
