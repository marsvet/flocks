name: momus
description: >-
  Expert reviewer for evaluating work plans against rigorous clarity,
  verifiability, and completeness standards.
mode: subagent
hidden: false
tags: [system]
delegatable: true
tools:
  - read
  - bash
  - grep
  - glob
  - question
  - memory_search
prompt_metadata:
  category: advisor
  cost: EXPENSIVE
  prompt_alias: Momus
  triggers:
    - domain: Plan review
      trigger: Evaluate work plans for clarity, verifiability, and completeness
    - domain: Quality assurance
      trigger: Catch gaps, ambiguities, and missing context before implementation
  use_when:
    - After Prometheus creates a work plan
    - Before executing a complex todo list
    - To validate plan quality before delegating to executors
    - When plan needs rigorous review for ADHD-driven omissions
  avoid_when:
    - Simple, single-task requests
    - When user explicitly wants to skip review
    - For trivial plans that don't need formal review
  key_trigger: "Work plan created -> invoke Momus for review before execution"
