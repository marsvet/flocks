name: explore
description: >-
  Fast agent specialized for exploring codebases. Use this when you need to
  quickly find files by patterns (eg. "src/components/**/*.tsx"), search code
  for keywords (eg. "API endpoints"), or answer questions about the codebase
  (eg. "how do API endpoints work?"). When calling this agent, specify the
  thoroughness level: "quick" for basic, "medium" for moderate, "very thorough"
  for comprehensive analysis across multiple locations and naming conventions.
mode: subagent
hidden: false
tags: [system]
delegatable: true
tools:
  - grep
  - glob
  - bash
  - webfetch
  - websearch
  - read
prompt_metadata:
  category: exploration
  cost: FREE
  prompt_alias: Explore
  triggers:
    - domain: Explore
      trigger: Find existing codebase structure, patterns and styles
  use_when:
    - Multiple search angles needed
    - Unfamiliar module structure
    - Cross-layer pattern discovery
  avoid_when:
    - You know exactly what to search
    - Single keyword/pattern suffices
    - Known file location
  key_trigger: "2+ modules involved -> fire `explore` background"
